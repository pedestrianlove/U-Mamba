[workspace]
authors = ["dannytso <dannytuzoo@gmail.com>"]
channels = ["nvidia/label/cuda-11.8.0", "conda-forge"]
name = "UMamba_project"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = "3.10.*"
pip = ">=23,<26"
ninja = "*"
cmake = "*"
gcc_linux-64 = "11.*"
gxx_linux-64 = "11.*"
cuda-toolkit = {version = "11.8.*", channel = "nvidia/label/cuda-11.8.0"}
setuptools = "<70"

[pypi-dependencies]
torch = { version = "==2.0.1", index = "https://download.pytorch.org/whl/cu118" }
torchvision = { version = "==0.15.2", index = "https://download.pytorch.org/whl/cu118" }
transformers = "==4.49.0"
numpy = "<2"
packaging = "*"
wheel = "*"
nnunetv2 = { path = "U-Mamba/umamba", editable = true }

# 💡 注意：我們把 causal 和 mamba 移除了，也沒有 pypi-options 了

[activation.env]
nnUNet_raw = "$HOME/scopelab/UMamba_project/U-Mamba/data/nnUNet_raw"
nnUNet_preprocessed = "$HOME/scopelab/UMamba_project/U-Mamba/data/nnUNet_preprocessed"
nnUNet_results = "$HOME/scopelab/UMamba_project/U-Mamba/data/nnUNet_results"
CUDA_HOME = "$CONDA_PREFIX"
CUDA_PATH = "$CONDA_PREFIX"
CPLUS_INCLUDE_PATH = "$CONDA_PREFIX/include:$CPLUS_INCLUDE_PATH"
LIBRARY_PATH = "$CONDA_PREFIX/lib:$LIBRARY_PATH"
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"

[tasks]
# ✨ 核心解法：建立一條依賴鏈 (Dependency Chain)
# 1. 確保環境內有 torch 後，先編譯 causal-conv1d
install-causal = "pip install causal-conv1d==1.2.0.post2 --no-build-isolation"

# 2. causal-conv1d 裝好後，接著編譯 mamba-ssm
install-mamba = { cmd = "pip install mamba-ssm==1.2.0.post1 --no-build-isolation", depends-on = ["install-causal"] }

# 3. 前面都過關後，最後執行測試
sanity-test = { cmd = "python -c 'import torch; import mamba_ssm; print(\"Sanity test passed! U-Mamba is ready.\")'", depends-on = ["install-mamba"] }