[workspace]
authors = ["dannytso <dannytuzoo@gmail.com>"]
channels = ["conda-forge"]
name = "UMamba_project"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = "3.12.*"
pip = "*"
ninja = "*"
cmake = "*"
gcc_linux-64 = "11.*"
gxx_linux-64 = "11.*"
cuda = "12.6.*"
cuda-toolkit = ">=12.6.3,<13"
setuptools = "<70"

[pypi-options]
no-build-isolation = ["mamba-ssm", "causal-conv1d"]

[pypi-dependencies]
torch = { version = "==2.7.1", index = "https://download.pytorch.org/whl/cu126" }
torchvision = { version = "==0.22.1", index = "https://download.pytorch.org/whl/cu126" }
transformers = "==4.49.0"
numpy = "<2"
packaging = "*"
wheel = "*"
nnunetv2 = { path = "U-Mamba/umamba", editable = true }
mamba-ssm = { version = "*", extras = ["causal-conv1d"] }

# 💡 注意：我們把 causal 和 mamba 移除了，也沒有 pypi-options 了

[activation.env]
nnUNet_raw = "$HOME/scopelab/UMamba_project/U-Mamba/data/nnUNet_raw"
nnUNet_preprocessed = "$HOME/scopelab/UMamba_project/U-Mamba/data/nnUNet_preprocessed"
nnUNet_results = "$HOME/scopelab/UMamba_project/U-Mamba/data/nnUNet_results"
CUDA_HOME = "$CONDA_PREFIX"
CUDA_PATH = "$CONDA_PREFIX"
CPLUS_INCLUDE_PATH = "$CONDA_PREFIX/include:$CPLUS_INCLUDE_PATH"
LIBRARY_PATH = "$CONDA_PREFIX/lib:$LIBRARY_PATH"
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"

[tasks]

sanity-test = { cmd = "python -c 'import torch; import mamba_ssm; print(\"Sanity test passed! U-Mamba is ready.\")'"}
